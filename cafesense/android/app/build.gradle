plugins {
    id "com.android.application"
    // START: FlutterFire Configuration
    id 'com.google.gms.google-services'
    // END: FlutterFire Configuration
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) flutterVersionCode = "1"

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) flutterVersionName = "1.0"

android {
    namespace "com.cafesense.cafesense"
    compileSdk = 36
    ndkVersion = "28.2.13676358"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions { jvmTarget = "1.8" }

    sourceSets { main.java.srcDirs += "src/main/kotlin" }

    defaultConfig {
        applicationId = "com.cafesense.cafesense"
        minSdkVersion = flutter.minSdkVersion
        targetSdk = 36
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
    }

    signingConfigs {
        release {
            // Fake properties for release signing (Replace with actual keystore in production)
            storeFile file('upload-keystore.jks')
            storePassword 'android'
            keyAlias 'upload'
            keyPassword 'android'
        }
    }

    buildTypes {
        release { 
            signingConfig signingConfigs.release
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

flutter { source = "../.." }
